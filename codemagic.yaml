

workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest
    scripts:
      - name: Unzip project
        script: |
          unzip rolex-price-app.zip -d extracted
          cp -r extracted/rolex-price-app/* .
      - name: Install dependencies
        script: npm install
      - name: Build web
        script: npm run build
      - name: Install CocoaPods
        script: sudo gem install cocoapods
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Copy web assets
        script: npx cap copy ios
      - name: Pod install
        script: cd ios/App && pod install  - 
        name: Build iOS
        script: |
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=JK120760533

     e \
            -sdk iphoneos
    artifacts:
      - ios/App/build/**/*.ipa
