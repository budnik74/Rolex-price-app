
workflows:
  ios-workflow:
    name: ios workflow
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest
    scripts:
      - name: Unzip project
        script: |
          unzip rolex-price-app.zip -d extracted
          cp -r extracted/rolex-price-app/* .
          ls -la
      - name: Install dependencies
        script: npm install
      - name: Build web
        script: npm run build
      - name: Install CocoaPods
        script: sudo gem install cocoapods
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Copy web assets
        script: npx cap copy ios
      - name: Pod install
        script: |
          ls -la ios/App/
          cd ios/App/App && pod install
      - name: Archive iOS
        script: |
          xcodebuild archive
          -workspace ios/App/App.xcworkspace
          -scheme App
          -configuration Release
          -sdk iphoneos
          -archivePath $CM_BUILD_DIR/App.xcarchive
          -allowProvisioningUpdates
          CODE_SIGN_STYLE=Automatic
          DEVELOPMENT_TEAM=JK120760533
      - name: Export IPA
        script: |
          xcodebuild -exportArchive
          -archivePath $CM_BUILD_DIR/App.xcarchive
          -exportPath $CM_BUILD_DIR/ipa
          -exportOptionsPlist ios/App/exportoptions.plist
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
